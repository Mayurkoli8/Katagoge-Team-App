name: Keep Supabase Alive

# Supabase pauses free-tier projects after 7 days of inactivity.
# This workflow makes a tiny REST call once per day so your project never sleeps.
# Setup: in your GitHub repo Settings > Secrets and variables > Actions, add
#   SUPABASE_URL       - same as VITE_SUPABASE_URL
#   SUPABASE_ANON_KEY  - same as VITE_SUPABASE_ANON_KEY

on:
  schedule:
    - cron: '17 6 * * *'   # 06:17 UTC every day (avoid midnight rush)
  workflow_dispatch:        # manual trigger button in Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit teams endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing secrets — set SUPABASE_URL and SUPABASE_ANON_KEY in repo settings."
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/teams?select=id&limit=1")
          echo "HTTP $code"
          # 200 = data returned, 401 = auth issue, anything else = problem.
          # We accept 200 only — 401 means our keys are wrong.
          if [ "$code" != "200" ]; then exit 1; fi
